:root {
  --bg0: #f4f2ed;
  --bg1: #faf9f6;
  --bg2: #edeae3;
  --bg3: #e4e0d7;
  --text: #18170f;
  --text2: #3a3830;
  --muted: #6b6860;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.18);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow: 0 8px 28px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
  --radius: 18px;
  --radius-sm: 12px;

  --infoBg: #e8f0fc;
  --infoText: #1a4fa8;
  --infoBorder: rgba(26,79,168,0.22);

  --warnBg: #fef3e2;
  --warnText: #7a4700;
  --warnBorder: rgba(122,71,0,0.22);

  --dangerBg: #fde8ec;
  --dangerText: #8a1f2b;
  --dangerBorder: rgba(138,31,43,0.22);

  --successBg: #e8f5e0;
  --successText: #2e6b0e;
  --successBorder: rgba(46,107,14,0.22);

  --rework: #D85A30;
  --voorraad: #2272C3;
  --machine: #3B7A1A;
  --kwaliteit: #6B5CE7;
  --pickfout: #C8386D;

  --sidebarW: 340px;
  --headerH: 72px;
  --crumbH: 40px;

  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg0: #1a1916;
    --bg1: #211f1c;
    --bg2: #2a2825;
    --bg3: #33302c;
    --text: #f0ede4;
    --text2: #c8c5bc;
    --muted: #8a8880;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
    --shadow: 0 8px 28px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.18);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.50), 0 4px 16px rgba(0,0,0,0.28);
    --infoBg: #0d2448;
    --infoText: #7aadee;
    --infoBorder: rgba(122,173,238,0.22);
    --warnBg: #251b08;
    --warnText: #f4c06a;
    --warnBorder: rgba(244,192,106,0.22);
    --dangerBg: #2a0d12;
    --dangerText: #f4909e;
    --dangerBorder: rgba(244,144,158,0.22);
    --successBg: #0f2207;
    --successText: #8fd06a;
    --successBorder: rgba(143,208,106,0.22);
  }
}

/* === NOISE TEXTURE OVERLAY === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

body {
  font-family: var(--font);
  background: var(--bg0);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* === LAYOUT === */
.app {
  height: 100vh;
  display: grid;
  grid-template-rows: var(--headerH) var(--crumbH) 1fr;
}

/* === HEADER === */
.header {
  height: var(--headerH);
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  z-index: 100;
  position: relative;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.brand-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--rework), #f08060);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(216,90,48,0.35);
}

.brand-text h1 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.2;
  color: var(--text);
}

.brand-text .sub {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.3;
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  justify-content: flex-end;
  min-width: 0;
}

/* === SEARCH === */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  max-width: 480px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 0 6px 0 12px;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.search-wrap:focus-within {
  border-color: var(--infoText);
  box-shadow: 0 0 0 3px var(--infoBg);
}

.search-wrap input {
  flex: 1;
  padding: 10px 0;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  min-width: 0;
}

.search-wrap input::placeholder { color: var(--muted); }

/* === BUTTONS === */
.btn {
  border: 1px solid var(--border2);
  background: var(--bg1);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  transition: transform 0.06s ease, background 0.12s, border-color 0.12s, box-shadow 0.12s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  letter-spacing: -0.01em;
}

.btn:hover { background: var(--bg2); box-shadow: var(--shadow-sm); }
.btn:active { transform: translateY(1px); box-shadow: none; }

.btn-primary {
  background: var(--infoBg);
  color: var(--infoText);
  border-color: var(--infoBorder);
}
.btn-primary:hover { background: var(--infoBg); filter: brightness(1.05); }

.btn-danger {
  background: var(--dangerBg);
  color: var(--dangerText);
  border-color: var(--dangerBorder);
}
.btn-danger:hover { background: var(--dangerBg); filter: brightness(1.04); }

.btn-warn {
  background: var(--warnBg);
  color: var(--warnText);
  border-color: var(--warnBorder);
}

.btn-success {
  background: var(--successBg);
  color: var(--successText);
  border-color: var(--successBorder);
}

.btn-icon {
  width: 34px;
  height: 34px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 16px;
}

/* === FAB (floating action button) === */
.fab {
  position: fixed;
  right: calc(var(--sidebarW) + 28px);
  bottom: 24px;
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--rework), #e87050);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 6px 24px rgba(216,90,48,0.45), 0 2px 8px rgba(0,0,0,0.1);
  z-index: 90;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  color: white;
}
.fab:hover { transform: scale(1.08) translateY(-2px); box-shadow: 0 10px 32px rgba(216,90,48,0.50); }
.fab:active { transform: scale(0.96); }
.fab-label {
  position: fixed;
  right: calc(var(--sidebarW) + 90px);
  bottom: 36px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateX(6px);
  transition: opacity 0.15s, transform 0.15s;
}
.fab:hover + .fab-label { opacity: 1; transform: translateX(0); }

@media (max-width: 980px) {
  .fab { right: 20px; }
  .fab-label { display: none; }
}

/* === CRUMB === */
.crumb-row {
  height: var(--crumbH);
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
  z-index: 90;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.crumb-row::-webkit-scrollbar { display: none; }

.crumb-item {
  display: flex;
  align-items: center;
  gap: 0;
  white-space: nowrap;
  animation: crumbIn 0.2s ease both;
}

@keyframes crumbIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}

.crumb-link {
  font-size: 12px;
  font-weight: 600;
  color: var(--infoText);
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  transition: background 0.1s;
}
.crumb-link:hover { background: var(--infoBg); }

.crumb-sep {
  color: var(--muted);
  font-size: 12px;
  margin: 0 2px;
  opacity: 0.5;
}

.crumb-current {
  font-size: 12px;
  font-weight: 800;
  color: var(--text2);
  padding: 4px 6px;
}

/* === MAIN LAYOUT === */
.main {
  height: calc(100vh - var(--headerH) - var(--crumbH));
  display: grid;
  grid-template-columns: 1fr var(--sidebarW);
  gap: 0;
  overflow: hidden;
}

/* === CONTENT === */
.content {
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

.content-scroll {
  overflow-y: auto;
  overflow-x: hidden;
  height: 100%;
  padding: 20px 20px 40px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.screen { display: none; }
.screen.active {
  display: block;
  animation: screenIn 0.22s cubic-bezier(0.25,0.46,0.45,0.94) both;
}

@keyframes screenIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === SIDEBAR === */
.sidebar {
  background: var(--bg1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100%;
}

.sidebar-head {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-head h3 {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

.sidebar-head .sub {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
}

.sidebar-body {
  padding: 14px 14px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: 100%;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

/* === PANELS === */
.panel {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 18px;
  margin-bottom: 14px;
}

.panel:last-child { margin-bottom: 0; }

.panel h2 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.2;
}

.panel > p {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.55;
}

/* === RULE BOX === */
.rule-box {
  background: var(--warnBg);
  color: var(--warnText);
  border: 1px solid var(--warnBorder);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.5;
  margin-top: 12px;
}

.rule-box b { color: var(--dangerText); }
.rule-box .rule-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

/* === GRID LAYOUTS === */
.grid-depts { display: grid; grid-template-columns: repeat(4, minmax(200px, 1fr)); gap: 12px; margin-top: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, minmax(240px, 1fr)); gap: 12px; margin-top: 14px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, minmax(200px, 1fr)); gap: 12px; margin-top: 14px; }

/* === BIG CARDS === */
.big-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px 16px;
  cursor: pointer;
  transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1), border-color 0.15s, box-shadow 0.15s;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both;
}

.big-card:nth-child(1) { animation-delay: 0.04s; }
.big-card:nth-child(2) { animation-delay: 0.08s; }
.big-card:nth-child(3) { animation-delay: 0.12s; }
.big-card:nth-child(4) { animation-delay: 0.16s; }
.big-card:nth-child(5) { animation-delay: 0.20s; }
.big-card:nth-child(6) { animation-delay: 0.24s; }
.big-card:nth-child(7) { animation-delay: 0.28s; }
.big-card:nth-child(8) { animation-delay: 0.32s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(14px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.big-card:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--border2);
  box-shadow: var(--shadow-lg);
}

.big-card:active { transform: translateY(-1px) scale(0.99); }

.big-card .card-title {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  line-height: 1.25;
}

.big-card .card-meta {
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.4;
  font-weight: 500;
}

.accent-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  border-radius: 18px 0 0 18px;
}

/* === PILLS & TAGS === */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 9px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 800;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
}

.pill.bleeder {
  background: var(--dangerBg);
  color: var(--dangerText);
  border-color: var(--dangerBorder);
}

.tag {
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
}

.tag-open { background: #fde8e0; color: #8a2200; border-color: rgba(138,34,0,0.2); }
.tag-lopend { background: #fef3d4; color: #7a4000; border-color: rgba(122,64,0,0.2); }
.tag-done { background: #dff4d4; color: #2a5e0a; border-color: rgba(42,94,10,0.2); }

.tags { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

/* === GALLERY (photo grid) === */
.gallery-wrap {
  overflow-y: auto;
  overflow-x: hidden;
  max-height: calc(100vh - var(--headerH) - var(--crumbH) - 240px);
  min-height: 320px;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.gallery { display: grid; grid-template-columns: repeat(4, minmax(200px, 1fr)); gap: 12px; }

.photo-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1), border-color 0.15s, box-shadow 0.15s;
  box-shadow: var(--shadow-sm);
  animation: cardIn 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both;
}

.photo-card:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--border2);
  box-shadow: var(--shadow);
}

.photo-frame {
  width: 100%;
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px;
  text-align: center;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
}

.placeholder .icon { font-size: 24px; opacity: 0.3; }

.photo-info { padding: 12px 12px 12px; display: flex; flex-direction: column; gap: 5px; }
.photo-info .name { font-size: 12.5px; font-weight: 800; line-height: 1.3; letter-spacing: -0.01em; }
.photo-info .sub { font-size: 11px; color: var(--muted); line-height: 1.3; }

/* === DETAIL VIEW === */
.detail {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 14px;
  margin-top: 0;
}

.detail-left, .detail-right {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.hero {
  width: 100%;
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  position: relative;
  overflow: hidden;
}

.hero img { width: 100%; height: 100%; object-fit: cover; display: block; }

.hero-label {
  position: absolute;
  left: 12px; bottom: 12px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #fff;
  padding: 7px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  max-width: 92%;
  line-height: 1.25;
}

.thumbs {
  display: flex;
  gap: 8px;
  padding: 10px 12px 12px;
  overflow-x: auto;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  scrollbar-width: none;
}
.thumbs::-webkit-scrollbar { display: none; }

.thumb {
  width: 140px;
  aspect-ratio: 16/9;
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  background: var(--bg3);
  transition: border-color 0.12s, transform 0.1s;
}
.thumb:hover { border-color: var(--infoText); transform: scale(1.03); }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.detail-right .box {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.detail-right .box:last-child { border-bottom: none; }

.kicker {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: var(--mono);
}

.detail-title {
  font-size: 17px;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 8px;
}

.detail-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.55;
  font-weight: 500;
}

.detail-meta {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.4;
}

/* === STEPS === */
.steps { display: flex; flex-direction: column; gap: 0; }

.step {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.step:last-child { border-bottom: none; }

.step-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 900;
  color: var(--muted);
  flex-shrink: 0;
  font-family: var(--mono);
}

.step-body .t { font-size: 12.5px; font-weight: 700; line-height: 1.4; }
.step-body .o { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* === SAP BLOCK === */
.sap-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.sap-item { }
.sap-item .sap-label {
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
  font-family: var(--mono);
}
.sap-value {

.bleed-item:hover { background: var(--bg2); }
.bleed-item .n { font-size: 12px; font-weight: 800; line-height: 1.3; margin-bottom: 3px; }
.bleed-item .p { font-size: 10.5px; color: var(--muted); }

.escalatie-card {
  background: var(--dangerBg);
  border: 1px solid var(--dangerBorder);
  border-radius: 14px;
  padding: 12px 14px;
}
.escalatie-card h4 { font-size: 12px; font-weight: 800; color: var(--dangerText); margin-bottom: 6px; }
.escalatie-card p { font-size: 11.5px; color: var(--muted); line-height: 1.45; margin-bottom: 10px; }

/* === MOBILE SIDEBAR OVERLAY === */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);

}

.sidebar-drawer {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: min(340px, 92vw);
  background: var(--bg1);
  border-left: 1px solid var(--border);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94);
  box-shadow: var(--shadow-lg);
}

.sidebar-overlay.open { display: block; }
.sidebar-overlay.open .sidebar-drawer { transform: translateX(0); }

/* === MODAL === */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 300;
}

.modal-backdrop.open { display: flex; }

.modal {
  width: min(720px, 96vw);
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: modalIn 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.94) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg1);

.modal-title { font-size: 14px; font-weight: 900; letter-spacing: -0.01em; }

.modal-body {
  padding: 16px;
  max-height: 76vh;
  overflow-y: auto;
  scrollbar-width: thin;
}

.modal-body h4 {
  font-size: 10px;

.modal-body p, .modal-body li {

.form-grid { display: flex; flex-direction: column; gap: 12px; }

.form-field { display: flex; flex-direction: column; gap: 5px; }

.form-field label {
  font-size: 10.5px;

.form-field input,
.form-field select,
.form-field textarea {

.form-field input:focus,
.form-field select:focus,

.form-field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  padding-right: 30px;

.ernst-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.ernst-option {
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  padding: 8px 10px;
  cursor: pointer;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  transition: all 0.12s;

.ernst-option:hover { border-color: var(--border2); background: var(--bg3); }
.ernst-option.selected-laag { background: var(--successBg); color: var(--successText); border-color: var(--successBorder); }

.ernst-option.selected-hoog { background: var(--dangerBg); color: var(--dangerText); border-color: var(--dangerBorder); }

.form-actions {

/* ============================================================
   UTILS
   ============================================================ */
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function statusClass(s){
  const v = (s||'').toLowerCase();
  if(v.includes('afgeh') || v.includes('done')) return 'tag-done';
  if(v.includes('lop')) return 'tag-lopend';
  return 'tag-open';
}

function firstPhoto(photos){ return photos?.length ? photos[0]?.src || null : null; }

/* ============================================================
   BREADCRUMB
   ============================================================ */
function updateBreadcrumb(){
  const bc = document.getElementById('breadcrumb');
  const parts = [{ label:'Home', fn: goHome }];
  if(state.afdeling) parts.push({ label: state.afdeling, fn: () => goAfdeling(state.afdeling) });
  if(state.pad === 'rework') parts.push({ label:'Rework', fn: () => goPad('rework') });
  if(state.pad === 'voorraad') parts.push({ label:'Voorraad', fn: () => goPad('voorraad') });
  if(state.pad === 'machine') parts.push({ label:'Machine', fn: () => goPad('machine') });
  if(state.reworkSub) parts.push({ label: state.reworkSub, fn: () => goReworkSub(state.reworkSub) });
  if(state.voorraadSub) parts.push({ label: state.voorraadSub, fn: () => goVoorraadSub(state.voorraadSub) });
  if(state.machinePart?.machine) parts.push({ label: state.machinePart.machine, fn: () => openMachinePart(state.machinePart.machine, state.machinePart.deel) });
  if(state.issue?.label) parts.push({ label: state.issue.label, fn: null });

  bc.innerHTML = parts.map((p, i) => {
    const last = i === parts.length - 1;
    if(last) return `<span class="crumb-item"><span class="crumb-current">${esc(p.label)}</span></span>`;
    return `<span class="crumb-item"><span class="crumb-link" onclick="(${p.fn.toString()})()">${esc(p.label)}</span><span class="crumb-sep">›</span></span>`;
  }).join('');
}

function setCrumb(label){
  document.getElementById('breadcrumb').innerHTML =
    `<span class="crumb-item"><span class="crumb-link" onclick="goHome()">Home</span><span class="crumb-sep">›</span></span>` +
    `<span class="crumb-item"><span class="crumb-current">${esc(label)}</span></span>`;
}

  const afd = state.afdeling;

  return `
    <div class="escalatie-card">

      <p>Issue niet gevonden in dashboard? Dan is escalatie verplicht via teamcoach + signaal naar Proces Engineer.</p>

function showOnly(id){

/* ============================================================

   ============================================================ */
function openIssueDetail(ref){
  state.heroIndex = 0;
  let issue = null;
  let context = '';

  if(ref.source === 'rework'){
    issue = reworkData[ref.sub]?.issues.find(x => x.id === ref.issueId);
    context = `${state.afdeling} · Rework · ${ref.sub}`;
  }
  if(ref.source === 'machine'){
    const machines = machineData[state.afdeling] || defaultMachineData(state.afdeling);
    const m = machines.find(x => x.machine === ref.machine);
    const d = m?.delen.find(x => x.deel === ref.deel);
    issue = d?.issues.find(x => x.id === ref.issueId);
    context = `${state.afdeling} · ${ref.machine} · ${ref.deel}`;
  }
  if(!issue) return;
  state.issue = issue;

  const wi = issue.werkinstructie?.length ? issue.werkinstructie : baseWI();
  const photos = issue.photos || [];
  const heroSrc = photos[0]?.src || null;
  const heroCap = photos[0]?.caption || issue.label;
  const backFn = ref.source === 'rework'
    ? `goReworkSub('${esc(ref.sub)}')`
    : `openMachinePart('${esc(ref.machine||'')}','${esc(ref.deel||'')}')`;

  document.getElementById('screen-issue-detail').innerHTML = `
    <div class="panel">
      <h2>${esc(context)}</h2>
      <p><strong>Geselecteerd:</strong> ${esc(issue.label)}</p>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn" onclick="${backFn}">← Terug</button>
        <button class="btn btn-danger" onclick="openEscalatie('Issue niet passend: ${esc(issue.label)}')">Niet passend → Escaleren</button>
      </div>
      <div class="rule-box" style="margin-top:12px;"><strong>Als dit issue jouw situatie niet dekt:</strong> escalatie verplicht + signaal P&E.</div>
    </div>

    <div class="detail">
      <div class="detail-left">
        <div class="hero" id="heroBox">
          ${heroSrc
            ? `<img src="${esc(heroSrc)}" alt="${esc(heroCap)}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'"/>`
            : ''}
          ${placeholderInner(issue.label)}
          <div class="hero-label">${esc(heroCap)}</div>
        </div>
        <div class="thumbs">${thumbsHTML(photos)}</div>
      </div>

      <div class="detail-right">
        <div class="box">
          <div class="kicker">ISSUE</div>
          <div class="detail-title">
            ${esc(issue.label)}
            ${issue.bleeder ? `<span class="pill bleeder" style="margin-left:8px;vertical-align:middle;">BLEEDER</span>` : ''}
          </div>
          <div class="tags">
            <span class="tag ${statusClass(issue.status)}">${esc(issue.status||'—')}</span>
          </div>
          <div class="detail-meta">Actie: ${esc(issue.actie||'—')} · Houder: ${esc(issue.actiehouder||'—')}</div>
        </div>

        <div class="box">
          <div class="kicker">HERKENNING / LES</div>
          <div class="detail-text">${esc(issue.herkenning||'—')}</div>
          <div class="detail-meta"><strong>Les:</strong> ${esc(issue.les||'—')}</div>
        </div>

/* ============================================================
   HTML BUILDERS
   ============================================================ */
function photoCardHTML({label,status,bleeder,subline,photo,onClick}){
  const isWI = status === 'WI';
  const tClass = isWI ? 'tag' : statusClass(status);
  const tLabel = isWI ? 'WI' : status;
  const frameContent = photo
    ? `<img src="${esc(photo)}" alt="${esc(label)}" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;" onerror="this.style.display='none'"/>${placeholderInner(label)}`
    : placeholderInner(label);
  return `
    <div class="photo-card" onclick="${onClick}">
      <div class="photo-frame" style="position:relative;">
        ${frameContent}
      </div>
      <div class="photo-info">
        <div class="name">${esc(label)}</div>
        <div class="sub">${esc(subline||'')}</div>
        <div class="tags">
          <span class="tag ${tClass}">${esc(tLabel)}</span>
          ${bleeder ? `<span class="pill bleeder">BLEEDER</span>` : ''}
        </div>
      </div>
    </div>
  `;
}

function placeholderInner(label){
  const safe = esc(label).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  return `<div class="placeholder"><div class="icon">&#128247;</div><div>Foto &middot; ${safe}</div></div>`;
}


function heroContent(photos, label){
  if(!photos?.length) return placeholderInner(label);
  const p = photos[state.heroIndex] || photos[0];
  if(!p.src) return placeholderInner(label);
  return `<img src="${esc(p.src)}" alt="${esc(p.caption||label)}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'"/>` + placeholderInner(label);
}

function thumbsHTML(photos){
  if(!photos?.length) return `<div style="padding:8px 2px;color:var(--muted);font-size:11.5px;font-weight:600;">Geen extra foto's — voeg toe via <code style='font-family:var(--mono);font-size:10.5px;'>photos:[...]</code></div>`;
  return photos.map((p,i) => `
    <div class="thumb" onclick="setHero(${i})" title="${esc(p.caption||'')}">
      <img src="${esc(p.src)}" alt="${esc(p.caption||'foto')}" onerror="this.style.display='none'"/>
    </div>`).join('');
}

function setHero(i){
  state.heroIndex = i;
  const box = document.getElementById('heroBox');
  if(!box || !state.issue) return;
  const photos = state.issue.photos || [];
  const p = photos[i];
  const cap = p?.caption || state.issue.label;
  const imgTag = p?.src
    ? `<img src="${esc(p.src)}" alt="${esc(cap)}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'"/>`
    : '';
  box.innerHTML = imgTag + placeholderInner(state.issue.label) + `<div class="hero-label">${esc(cap)}</div>`;
}

function stepHTML(n, text, owner){
  return `
    <div class="step">
      <div class="step-num">${n}</div>
      <div class="step-body">
        <div class="t">${esc(text)}</div>
        <div class="o">Verantwoordelijk: ${esc(owner||'—')}</div>
      </div>
    </div>`;
}

function sapHTML(sap){
  const f = (v) => `<div class="sap-value">${esc(v||'n.t.b.')}</div>`;
  const items = [
    ['TRANSACTIE', sap?.transactie],
    ['BESTELREDEN', sap?.bestelreden],
    ['SUBREDEN', sap?.subreden],
    ['SCHADEREDEN', sap?.schadereden]
  ];
  const boek = sap?.boekingen || [];
  return `
    <div class="sap-grid">
      ${items.map(([l,v])=>`<div class="sap-item"><div class="sap-label">${l}</div>${f(v)}</div>`).join('')}
    </div>
    <div style="margin-top:10px;">
      <div class="sap-label" style="font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:5px;">SAP BOEKINGEN</div>
      ${boek.length
        ? `<ul style="margin-left:18px;">${boek.map(x=>`<li style="font-size:12px;color:var(--muted);line-height:1.5;">${esc(x)}</li>`).join('')}</ul>`
        : `<div style="font-size:11.5px;color:var(--muted);">n.t.b. — voeg toe in <code style="font-family:var(--mono);font-size:10.5px;">sap.boekingen[]</code></div>`}
    </div>`;
}

/* ============================================================
   SEARCH (fuzzy: bevat alle woorden)
   ============================================================ */
let flatIndex = [];

function buildIndex(){
  flatIndex = [];
  Object.keys(reworkData).forEach(sub => {
    reworkData[sub].issues.forEach(it => {
      flatIndex.push({
        type:'Rework', title:it.label,
        kw:[it.label,it.actie,it.actiehouder,it.herkenning,it.les,it.sap?.transactie,it.sap?.bestelreden,sub,'rework'].filter(Boolean).join(' ').toLowerCase(),
        open:() => { if(!state.afdeling) goAfdeling('Assemblage'); goPad('rework'); goReworkSub(sub); openIssueDetail({source:'rework',sub,issueId:it.id}); }
      });
    });
  });
  Object.keys(voorraadInstructies).forEach(k => {
    const d = voorraadInstructies[k];
    flatIndex.push({
      type:'Voorraad', title:k,
      kw:[k,d.les,(d.steps||[]).map(s=>s.text).join(' '),d.sap?.bestelreden,'voorraad'].filter(Boolean).join(' ').toLowerCase(),
      open:() => { if(!state.afdeling) goAfdeling('Assemblage'); goPad('voorraad'); goVoorraadSub(k); }
    });
  });
  afdelingen.forEach(afd => {
    const machines = machineData[afd] || defaultMachineData(afd);
    machines.forEach(m => m.delen.forEach(d => d.issues.forEach(it => {
      flatIndex.push({
        type:'Machine', title:it.label,
        kw:[it.label,it.actie,it.actiehouder,it.les,afd,m.machine,d.deel,'machine'].filter(Boolean).join(' ').toLowerCase(),
        open:() => { goAfdeling(afd); goPad('machine'); openMachinePart(m.machine,d.deel); openIssueDetail({source:'machine',machine:m.machine,deel:d.deel,issueId:it.id}); }
      });
    })));
  });
}

function runSearch(){
  const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  buildIndex();
  setCrumb('Zoeken');

  if(!q){
    document.getElementById('screen-search').innerHTML = `
      <div class="panel"><h2>Zoeken</h2><p>Vul een zoekterm in en druk Enter of klik Zoek.</p></div>`;
    showOnly('screen-search');
    return;
  }

  // Fuzzy: alle woorden moeten voorkomen
  const words = q.split(/\s+/).filter(Boolean);
  const hits = flatIndex.filter(x => words.every(w => x.kw.includes(w))).slice(0, 60);

  window.__hits = hits;

  document.getElementById('screen-search').innerHTML = `
    <div class="panel">
      <h2>Zoekresultaten</h2>
      <p>Zoekterm: <strong>${esc(q)}</strong> · ${hits.length} treffer(s)</p>
      ${!hits.length ? `
        <div class="rule-box" style="margin-top:12px;">
          <strong>Geen resultaat gevonden.</strong><br/>
          Dit betekent: escalatie verplicht + signaal P&E.
          <div class="rule-actions">
            <button class="btn btn-danger" onclick="openEscalatie('Zoekterm zonder match: ${esc(q)}')">⚠ Escaleren</button>
            <button class="btn" onclick="openMeldingForm()">+ Nieuw issue melden</button>
          </div>
        </div>` : ''}
    </div>
    ${hits.length ? `
      <div class="panel">
        <h2>Matches</h2>
        <div class="search-hits">
          ${hits.map((h,i) => `
            <div class="hit-card" onclick="window.__hits[${i}]?.open()">
              <div>
                <div class="ht">${esc(h.title)}</div>
                <div class="hm">${esc(h.type)}</div>
              </div>
              <span class="hit-type">${esc(h.type)}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}
  `;
  showOnly('screen-search');
}
